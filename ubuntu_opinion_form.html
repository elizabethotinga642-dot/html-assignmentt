<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Feedback Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      display: flex;
      justify-content: center;
      padding: 50px;
    }
    form {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      width: 400px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .gender {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    .submit-btn { background-color: #4CAF50; color: white; }
    .reset-btn { background-color: #f0ad4e; color: white; margin-left: 10px; }
    .cancel-btn { background-color: #d9534f; color: white; margin-left: 10px; }
  </style>
</head>
<body>

  <form action="/submit_form" method="post">
    <h2>User Feedback Form</h2>

    <label for="firstName">First Name:</label>
    <input type="text" id="firstName" name="first_name" placeholder="Enter your first name" required>

    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" name="last_name" placeholder="Enter your last name" required>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob" required>

    <label>Gender:</label>
    <div class="gender">
      <label><input type="radio" name="gender" value="male" required> Male</label>
      <label><input type="radio" name="gender" value="female"> Female</label>
    </div>

    <label for="opinion">Opinion on the phrase "Ubuntu":</label>
    <textarea id="opinion" name="opinion" rows="4" placeholder="Share your thoughts..." required></textarea>

    <div>
      <button type="submit" class="submit-btn">Submit</button>
      <button type="reset" class="reset-btn">Clear</button>
      <button type="button" class="cancel-btn" onclick="window.location.href='/'">Cancel</button>
    </div>
  </form>

</body>
</html>
